services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - db-data:/app/data
    environment:
      - PAPERLOCK_ENV=production
      - DATABASE_URL=sqlite:////app/data/paperlock.db
      # SECRET_KEY is REQUIRED (no insecure default). Set it in a .env file
      # next to this compose file. The app refuses to start without a strong one.
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required - see .env.example}
      # Same-origin behind nginx, so CORS is unused; set if you split origins.
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db-data:
